<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="communityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#communityGradient)"/>
  
  <!-- Background pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="80" r="30" fill="white"/>
    <circle cx="500" cy="300" r="40" fill="white"/>
  </g>
  
  <!-- People/Community icons -->
  <g transform="translate(80, 100)">
    <!-- Person 1 -->
    <circle cx="30" cy="20" r="12" fill="white"/>
    <rect x="20" y="35" width="20" height="30" fill="white"/>
    <rect x="15" y="40" width="8" height="20" fill="white"/>
    <rect x="37" y="40" width="8" height="20" fill="white"/>
  </g>
  
  <g transform="translate(150, 95)">
    <!-- Person 2 -->
    <circle cx="30" cy="20" r="12" fill="white"/>
    <rect x="20" y="35" width="20" height="30" fill="white"/>
    <rect x="15" y="40" width="8" height="20" fill="white"/>
    <rect x="37" y="40" width="8" height="20" fill="white"/>
  </g>
  
  <g transform="translate(220, 105)">
    <!-- Person 3 -->
    <circle cx="30" cy="20" r="12" fill="white"/>
    <rect x="20" y="35" width="20" height="30" fill="white"/>
    <rect x="15" y="40" width="8" height="20" fill="white"/>
    <rect x="37" y="40" width="8" height="20" fill="white"/>
  </g>
  
  <!-- Message bubbles -->
  <g opacity="0.9">
    <!-- Bubble 1 -->
    <rect x="50" y="200" width="140" height="60" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="120" y="235" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Community</text>
    
    <!-- Bubble 2 -->
    <rect x="250" y="220" width="140" height="60" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="320" y="255" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Feedback</text>
    
    <!-- Bubble 3 -->
    <rect x="410" y="200" width="140" height="60" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="480" y="235" font-size="12" fill="white" text-anchor="middle" font-family="Arial">Connected</text>
  </g>
  
  <!-- Main text -->
  <text x="300" y="330" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Valenzuela Community</text>
  <text x="300" y="365" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial">Share Your Voice & Feedback</text>
</svg>