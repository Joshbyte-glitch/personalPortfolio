<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petcareGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C44569;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#petcareGradient)"/>
  
  <!-- Paw prints decoration -->
  <g opacity="0.3">
    <circle cx="100" cy="80" r="15" fill="white"/>
    <circle cx="70" cy="60" r="10" fill="white"/>
    <circle cx="130" cy="60" r="10" fill="white"/>
    <circle cx="60" cy="100" r="10" fill="white"/>
    <circle cx="140" cy="100" r="10" fill="white"/>
  </g>
  
  <!-- Pet icons -->
  <g transform="translate(150, 100)">
    <!-- Cat head -->
    <circle cx="50" cy="50" r="40" fill="white"/>
    <!-- Ears -->
    <polygon points="20,15 10,0 25,20" fill="white"/>
    <polygon points="80,15 90,0 75,20" fill="white"/>
    <!-- Eyes -->
    <circle cx="35" cy="40" r="5" fill="#FF6B9D"/>
    <circle cx="65" cy="40" r="5" fill="#FF6B9D"/>
    <!-- Nose -->
    <polygon points="50,55 45,65 55,65" fill="#FF6B9D"/>
  </g>
  
  <!-- Dog icon -->
  <g transform="translate(350, 100)">
    <!-- Head -->
    <circle cx="50" cy="50" r="35" fill="white"/>
    <!-- Ears -->
    <ellipse cx="25" cy="25" rx="12" ry="25" fill="white"/>
    <ellipse cx="75" cy="25" rx="12" ry="25" fill="white"/>
    <!-- Eyes -->
    <circle cx="40" cy="45" r="5" fill="#C44569"/>
    <circle cx="60" cy="45" r="5" fill="#C44569"/>
    <!-- Nose -->
    <circle cx="50" cy="60" r="6" fill="#C44569"/>
    <!-- Tongue -->
    <ellipse cx="50" cy="72" rx="5" ry="8" fill="#FF6B9D"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="320" font-size="36" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">Petcare</text>
  <text x="300" y="360" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial">Pet Supplies & Care</text>
</svg>